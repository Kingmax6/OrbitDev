<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrampoDev - Aprende Código</title>
    <style>
        body { font-family: 'Courier New', monospace; background: #0d1117; color: #c9d1d9; margin: 0; padding: 15px; }
        h1 { color: #58a6ff; text-align: center; }
        .card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 15px; margin: 15px 0; }
        textarea { width: 100%; height: 120px; background: #0d1117; color: #7ee787; border: 1px solid #30363d; border-radius: 6px; font-size: 14px; box-sizing: border-box; }
        button { background: #238636; color: white; border: none; padding: 12px; width: 100%; border-radius: 6px; font-size: 1rem; margin-top: 10px; cursor: pointer; }
        button:hover { background: #2ea043; }
        #output { background: white; color: black; min-height: 100px; margin-top: 10px; border-radius: 6px; padding: 10px; }
        .explica { font-size: 0.9rem; color: #8b949e; }
    </style>
</head>
<body>
    <h1>TrampoDev 👨🏾‍💻</h1>
    <div class="card">
        <h3>Missão 1: Teu primeiro botão</h3>
        <p class="explica">Objetivo: Fazer um botão que mostra "Salve!" quando clica. É o "oi mundo" dos devs.</p>
        <textarea id="codigo"><button onclick="alert('Salve, futuro dev!')">
Clica em mim
</button></textarea>
        <button onclick="rodarCodigo()">Rodar meu código ▶️</button>
        <div id="output"></div>
    </div>
    <div class="card">
        <h3>Por que isso é programar?</h3>
        <p class="explica">
        1. `onclick` = "quando clicar" <br>
        2. `alert()` = "mostra essa mensagem" <br>
        Tu deu uma ordem pro celular. Isso é programar. Tu já é dev.
        </p>
    </div>
    <script>
        function rodarCodigo() {
            const codigo = document.getElementById('codigo').value;
            document.getElementById('output').innerHTML = codigo;
        }
    </script>
</body>
      </html>
